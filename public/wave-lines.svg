<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <!-- Fade in → full → fade out gradients per wave -->
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#7900ff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#7900ff" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#0531fa" stop-opacity="0.7"/>
      <stop offset="82%"  stop-color="#7900ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7900ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#0531fa" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#0531fa" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#00bcff" stop-opacity="0.6"/>
      <stop offset="78%"  stop-color="#0531fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0531fa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#00bcff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00bcff" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#7900ff" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#00bcff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00bcff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#7900ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00bcff" stop-opacity="0.4"/>
      <stop offset="70%"  stop-color="#0531fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7900ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Wave 1 — purple/blue, 3 cycles, center Y=14 -->
  <path d="M 0,14
           C 25,6  50,6  75,14
           C 100,22 125,22 150,14
           C 175,6  200,6  225,14
           C 250,22 275,22 300,14
           C 325,6  350,6  375,14
           C 400,22 425,22 450,14
           C 475,6  500,6  525,14
           C 550,22 575,22 600,14"
        fill="none" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Wave 2 — blue/teal, 2 cycles, opposite phase, center Y=30 -->
  <path d="M 0,30
           C 37,40  63,40  100,30
           C 137,20 163,20 200,30
           C 237,40 263,40 300,30
           C 337,20 363,20 400,30
           C 437,40 463,40 500,30
           C 537,20 563,20 600,30"
        fill="none" stroke="url(#g2)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Wave 3 — teal/purple, 3 cycles, center Y=46 -->
  <path d="M 0,46
           C 25,38 50,38 75,46
           C 100,54 125,54 150,46
           C 175,38 200,38 225,46
           C 250,54 275,54 300,46
           C 325,38 350,38 375,46
           C 400,54 425,54 450,46
           C 475,38 500,38 525,46
           C 550,54 575,54 600,46"
        fill="none" stroke="url(#g3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wave 4 — subtle extra layer, center Y=62 -->
  <path d="M 0,62
           C 50,54 100,54 150,62
           C 200,70 250,70 300,62
           C 350,54 400,54 450,62
           C 500,70 550,70 600,62"
        fill="none" stroke="url(#g4)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
